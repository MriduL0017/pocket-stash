<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer Gold Coin -->
  <circle cx="50" cy="50" r="48" fill="#FCD34D" stroke="#D97706" stroke-width="3"/>
  
  <!-- Inner Detail Ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#D97706" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- Curved Text: POCKET STASH -->
  <path id="topCurve" d="M 20 50 A 30 30 0 0 1 80 50" fill="transparent" />
  <text font-family="system-ui, sans-serif" font-weight="900" font-size="11" fill="#92400E" letter-spacing="1.5">
    <textPath href="#topCurve" startOffset="50%" text-anchor="middle">POCKET STASH</textPath>
  </text>

  <!-- The Money Sack -->
  <path d="M 50 48 C 35 48 30 68 30 75 C 30 82 40 85 50 85 C 60 85 70 82 70 75 C 70 68 65 48 50 48 Z" fill="#92400E"/>
  <path d="M 45 48 L 40 40 C 45 38 55 38 60 40 L 55 48 Z" fill="#92400E"/>
  <path d="M 42 48 Q 50 50 58 48" stroke="#FCD34D" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Rupee Symbol on Sack -->
  <text x="50" y="73" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" fill="#FCD34D" text-anchor="middle">₹</text>

  <!-- Dropping Coins -->
  <circle cx="45" cy="32" r="4" fill="#FBBF24" stroke="#D97706" stroke-width="1"/>
  <circle cx="58" cy="30" r="3" fill="#FBBF24" stroke="#D97706" stroke-width="1"/>
  <circle cx="52" cy="24" r="4" fill="#FBBF24" stroke="#D97706" stroke-width="1"/>
</svg>
